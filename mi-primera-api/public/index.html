<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster AI | UX Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --primary: #7eb6ff;
            --primary-hover: #6ea1e6; --danger: #ff9999; --text-main: #444a57;
            --text-dim: #9ca3af; --border: #e5e7eb; --progress-track: #edf2f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            background-image: linear-gradient(135deg, #f0f2f5 0%, #e0e7ff 100%);
            color: var(--text-main); display: flex; justify-content: center;
            min-height: 100vh; padding: 40px 20px;
        }

        .container {
            background: var(--card); padding: 2rem; border-radius: 20px;
            width: 100%; max-width: 480px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 1.2rem; text-align: center; color: #5a67d8; }

        /* --- PROGRESO --- */
        .progress-section {
            margin-bottom: 1.5rem; background: #f8fafc; padding: 12px;
            border-radius: 12px; border: 1px solid var(--border);
        }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; font-weight: 500; }
        .progress-bar-bg { width: 100%; height: 6px; background: var(--progress-track); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.6s ease; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #f9fafb; border: 1px solid var(--border); padding: 12px; border-radius: 10px; outline: none; }
        button.add { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; }

        /* --- FILTROS --- */
        .filters { display: flex; gap: 8px; margin-bottom: 1.2rem; justify-content: center; }
        .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 0.8rem; cursor: pointer; color: var(--text-dim); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- LISTA --- */
        #taskList { list-style: none; min-height: 200px; }
        li {
            background: white; border: 1px solid var(--border); padding: 12px;
            border-radius: 12px; margin-bottom: 8px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .task-content { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; }
        .checkbox { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; }
        .checkbox.checked { background: #60a5fa; border-color: #60a5fa; }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 10px; font-weight: bold; }
        .task-text.completed { color: var(--text-dim); text-decoration: line-through; }

        button.delete { background: #fee2e2; color: #ef4444; border: none; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; }

        /* --- PAGINACIÓN --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .page-btn { background: white; border: 1px solid var(--border); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #pageInfo { font-size: 0.85rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mis Objetivos</h1>

        <div class="progress-section">
            <div class="progress-info">
                <span id="progressPercent">0%</span>
                <span id="progressCount">0/0</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Nueva tarea...">
            <button class="add" onclick="addTask()">+</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
            <button class="filter-btn" onclick="setFilter('pending', this)">Pendientes</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Hechas</button>
        </div>

        <ul id="taskList"></ul>

        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Anterior</button>
            <span id="pageInfo">Página 1 de 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">Siguiente</button>
        </div>
    </div>

    <script>
        const API = '/tareas';
        let currentPage = 1;
        let totalPages = 1;
        let currentFilter = 'all';

        async function getTasks() {
            try {
                // Pedimos a la API la página específica
                const res = await fetch(`${API}?page=${currentPage}`);
                const data = await res.json();
                
                totalPages = data.totalPages;
                renderTasks(data.tareas, data.totalTasks);
                updatePaginationControls();
            } catch (err) { console.error(err); }
        }

        function renderTasks(tasks, totalCount) {
            const list = document.getElementById('taskList');
            
            // Filtro visual rápido
            const filtered = tasks.filter(t => {
                if (currentFilter === 'pending') return !t.completada;
                if (currentFilter === 'completed') return t.completada;
                return true;
            });

            updateUIProgress(tasks, totalCount);

            list.innerHTML = filtered.map(t => `
                <li>
                    <div class="task-content" onclick="toggleTask('${t._id}', ${t.completada})">
                        <div class="checkbox ${t.completada ? 'checked' : ''}"></div>
                        <span class="task-text ${t.completada ? 'completed' : ''}">${t.titulo}</span>
                    </div>
                    <button class="delete" onclick="deleteTask('${t._id}')">&times;</button>
                </li>
            `).join('');
        }

        function updateUIProgress(tasks, total) {
            const completed = tasks.filter(t => t.completada).length; // Esto es una aprox por página
            const percentage = total === 0 ? 0 : Math.round((completed / tasks.length) * 100); 
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressCount').innerText = `En esta página: ${completed}/${tasks.length}`;
        }

        function updatePaginationControls() {
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            document.getElementById('pageInfo').innerText = `Página ${currentPage} de ${totalPages}`;
        }

        function changePage(step) {
            currentPage += step;
            getTasks();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            getTasks();
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ titulo: input.value })
            });
            input.value = '';
            getTasks();
        }

        async function toggleTask(id, status) {
            await fetch(`${API}/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ completada: !status })
            });
            getTasks();
        }

        async function deleteTask(id) {
            if (confirm("¿Eliminar?")) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                getTasks();
            }
        }

        getTasks();
    </script>
</body>
</html>
